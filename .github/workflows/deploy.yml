name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-it-all:latest .

      - name: Save image as tarball
        run: docker save agent-it-all:latest | gzip > agent-it-all.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: agent-it-all.tar.gz
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker load < /tmp/agent-it-all.tar.gz
            docker stop agent-it-all || true
            docker rm agent-it-all || true
            docker run -d \
              --name agent-it-all \
              --restart unless-stopped \
              -p 3003:3003 \
              -v /data/agent-it-all:/app/data \
              -e AUTH_PASSWORD="${{ secrets.AUTH_PASSWORD }}" \
              -e AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              -e SMTP_SECURE="${{ secrets.SMTP_SECURE }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASS="${{ secrets.SMTP_PASS }}" \
              -e SMTP_TO="${{ secrets.SMTP_TO }}" \
              agent-it-all:latest
            rm /tmp/agent-it-all.tar.gz
